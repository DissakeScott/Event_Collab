server:
  port: 8084

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:notifs_db}
    username: ${DB_USER:eventcollab}
    password: ${DB_PASS:eventcollab}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Email — en dev on utilise Mailhog (mock SMTP)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_SECRET:eventcollab-super-secret-key-must-be-at-least-256-bits-long-for-security}
  mail:
    from: noreply@eventcollab.com
    mock: ${MAIL_MOCK:true}   # true = log l email au lieu de l envoyer

logging:
  level:
    com.eventcollab: DEBUG

server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:users_db}
    username: ${DB_USER:eventcollab}
    password: ${DB_PASS:eventcollab}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_SECRET:eventcollab-super-secret-key-must-be-at-least-256-bits-long-for-security}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

logging:
  level:
    com.eventcollab: DEBUG
    org.springframework.security: INFO

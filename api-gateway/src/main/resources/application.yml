server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
        - id: event-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/events/**
        - id: ticket-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/tickets/**
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health

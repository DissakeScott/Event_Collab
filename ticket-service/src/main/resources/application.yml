server:
  port: 8083

spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:tickets_db}
    username: ${DB_USER:eventcollab}
    password: ${DB_PASS:eventcollab}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_SECRET:eventcollab-super-secret-key-must-be-at-least-256-bits-long-for-security}
  event-service:
    url: ${EVENT_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.eventcollab: DEBUG

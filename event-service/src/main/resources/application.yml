server:
  port: 8082
spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:events_db}
    username: ${DB_USER:eventcollab}
    password: ${DB_PASS:eventcollab}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
